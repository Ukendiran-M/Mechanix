<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copertura & Contatti - SOS Auto Bologna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #080b11;
      --accent-orange: #ff9f1c;
      --accent-red: #ff5e36;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    html { scroll-behavior: smooth; }
    body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }
    a { -webkit-tap-highlight-color: transparent; text-decoration: none; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 5%; height: 70px;
      background: rgba(8, 11, 17, 0.98); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 900; }
    .nav-logo .sos { background: linear-gradient(135deg, var(--accent-orange), var(--accent-red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-logo .rest { color: var(--text-main); }

    /* ALL NAV LINKS — VISIBLE BUT COMPLETELY NON-CLICKABLE */
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      color: var(--text-muted);
      font-size: 14px; font-weight: 500;
      position: relative; padding-bottom: 3px;
      pointer-events: none !important;
      cursor: default !important;
      -webkit-user-select: none; user-select: none;
    }
    .nav-links a.active { color: var(--text-main); }

    /* NAV CTA — non-clickable */
    .nav-cta {
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
      color: #000; padding: 11px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 800;
      pointer-events: none !important;
      cursor: default !important;
      -webkit-user-select: none; user-select: none;
      opacity: 0.6;
    }

    /* HAMBURGER — non-clickable on mobile */
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      pointer-events: none !important;
      cursor: default !important;
    }
    .hamburger span { width: 24px; height: 2px; background: var(--text-main); border-radius: 2px; }
    @media(max-width:768px) {
      .nav-links, .nav-cta { display: none; }
      .hamburger { display: flex; }
    }

    /* BODY — completely empty, just dark background */
    .page-body { min-height: 100vh; background: var(--bg-dark); }
  </style>
</head>
<body>

<nav id="navbar">
  <a class="nav-logo" tabindex="-1">
    <span class="sos">SOS</span><span class="rest"> Auto Bologna</span>
  </a>
  <ul class="nav-links">
    <li><a tabindex="-1">Home</a></li>
    <li><a tabindex="-1">Servizi</a></li>
    <li><a class="active" tabindex="-1">Copertura &amp; Contatti</a></li>
  </ul>
  <span class="nav-cta">📞 Chiama Ora</span>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="page-body"></div>

</body>
</html>
